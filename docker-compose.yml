services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyberbuddy
      POSTGRES_USER: cyberbuddy
      POSTGRES_PASSWORD: cyberbuddy
    ports:
      - "5433:5432"   # changed from 5432 -> 5433 to avoid port conflict
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
      - redis
    ports:
      - "8080:80"     # nginx is inside this container (same as Render)

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  pgdata:
